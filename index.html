<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="USZMate" />
  <title>USZMate</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #0f2040;
      --navy-light: #162d55;
      --yellow: #f5c800;
      --yellow-glow: rgba(245,200,0,0.15);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --border: rgba(245,200,0,0.2);
      --input-bg: rgba(255,255,255,0.05);
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Outfit',sans-serif; background:var(--navy); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 20%,rgba(245,200,0,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(245,200,0,0.04) 0%,transparent 50%); pointer-events:none; z-index:0; }

    /* LOGIN */
    #loginScreen { position:fixed; inset:0; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:24px; padding:40px; }
    #loginScreen::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 40%,rgba(245,200,0,0.08) 0%,transparent 60%); pointer-events:none; }
    .login-logo { font-family:'Bebas Neue',sans-serif; font-size:72px; color:var(--yellow); letter-spacing:8px; text-shadow:0 0 40px rgba(245,200,0,0.4); animation:pulse-glow 3s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100%{text-shadow:0 0 40px rgba(245,200,0,0.4);}50%{text-shadow:0 0 60px rgba(245,200,0,0.7);} }
    .login-subtitle { font-size:12px; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; margin-top:-16px; }
    .login-ai-notice { font-size:10px; color:rgba(245,200,0,0.4); text-align:center; margin-top:-8px; }
    .login-form { display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; position:relative; z-index:1; }
    .login-input { background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:14px 20px; color:var(--text); font-family:'Outfit',sans-serif; font-size:16px; outline:none; text-align:center; letter-spacing:4px; transition:border-color 0.2s,box-shadow 0.2s; }
    .login-input:focus { border-color:var(--yellow); box-shadow:0 0 20px rgba(245,200,0,0.15); }
    .login-input::placeholder { letter-spacing:1px; color:var(--text-muted); }
    .login-btn { background:var(--yellow); color:var(--navy); border:none; border-radius:12px; padding:14px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; }
    .login-btn:active{transform:scale(0.97);}
    .login-btn:hover{box-shadow:0 4px 20px rgba(245,200,0,0.4);}
    .login-error { color:#ff4d4d; font-size:13px; text-align:center; min-height:18px; }

    /* APP */
    #app { display:none; flex-direction:column; height:100dvh; position:relative; z-index:1; }
    #app.visible { display:flex; }

    /* HEADER */
    header { display:flex; align-items:flex-start; justify-content:space-between; padding:10px 14px 6px; background:rgba(10,22,40,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); flex-shrink:0; }
    .header-left { display:flex; flex-direction:column; gap:1px; }
    .header-brand { font-size:9px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; line-height:1.6; }
    .header-brand span { display:block; }
    .header-ai-notice { font-size:8px; color:rgba(245,200,0,0.4); letter-spacing:0.5px; }
    .header-center { position:absolute; left:50%; transform:translateX(-50%); top:6px; text-align:center; }
    .header-title { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--yellow); letter-spacing:8px; line-height:1; text-shadow:0 0 20px rgba(245,200,0,0.3); }
    .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .lang-selector { display:flex; gap:3px; }
    .lang-btn { background:transparent; border:1px solid transparent; border-radius:6px; padding:3px 7px; color:var(--text-muted); font-family:'Outfit',sans-serif; font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .lang-btn.active { background:var(--yellow-glow); border-color:var(--yellow); color:var(--yellow); }

    /* LOCATION */
    .location-bar { background:rgba(245,200,0,0.08); border-bottom:1px solid var(--border); padding:4px 14px; display:flex; align-items:center; gap:6px; flex-shrink:0; justify-content:space-between; }
    .location-bar .loc-text { font-size:11px; color:var(--yellow); }
    .location-bar .datetime-text { font-size:10px; color:rgba(245,200,0,0.7); text-align:right; }

    /* INFO BANNER */
    #infoBanner { display:none; }
    .welcome-divider { display:none; }

    /* MAIN BUTTONS */
    .main-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:6px 8px; background:rgba(10,22,40,0.95); flex-shrink:0; border-bottom:1px solid var(--border); }
    .main-btn { background:var(--navy-mid); border:1px solid var(--border); border-radius:8px; padding:5px 3px; color:var(--yellow); font-size:9px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .main-btn:active { transform:scale(0.95); background:var(--yellow-glow); }
    .main-btn.active { background:var(--yellow-glow); border-color:var(--yellow); }
    .main-btn-icon { font-size:16px; }

    /* CHAT */
    #chatArea { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; background:#e8e8e8; border-bottom:2px solid var(--yellow); }
    #chatArea::-webkit-scrollbar{width:4px;}
    #chatArea::-webkit-scrollbar-thumb{background:#aaa;border-radius:2px;}
    .message { max-width:88%; padding:10px 13px; border-radius:var(--radius); font-size:13px; line-height:1.6; animation:fadeUp 0.3s ease; color:#111; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    .message.ai { background:#ffffff; border:1px solid #ccc; align-self:flex-start; border-bottom-left-radius:4px; }
    .message.user { background:var(--navy); border:1px solid var(--navy-light); align-self:flex-end; border-bottom-right-radius:4px; color:var(--yellow); }
    .message a { color:#1a56db; text-decoration:underline; text-underline-offset:3px; }
    .message.user a { color:var(--yellow); }
    .typing-indicator { display:flex; gap:5px; padding:12px 14px; background:#ffffff; border:1px solid #ccc; border-radius:var(--radius); border-bottom-left-radius:4px; align-self:flex-start; }
    .typing-dot { width:7px; height:7px; background:var(--navy); border-radius:50%; animation:typing 1.2s infinite; opacity:0.4; }
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typing { 0%,100%{opacity:0.4;transform:translateY(0);}50%{opacity:1;transform:translateY(-4px);} }

    /* IMAGE PREVIEW */
    .image-preview-wrap { padding:6px 14px 0; flex-shrink:0; background:rgba(10,22,40,0.95); }
    .image-preview{position:relative;display:inline-block;}
    .image-preview img { height:56px; width:56px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
    .image-preview-remove { position:absolute; top:-6px; right:-6px; background:#ff4d4d; border:none; border-radius:50%; width:18px; height:18px; color:white; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* INPUT */
    .input-area { padding:8px 12px; padding-bottom:max(8px,env(safe-area-inset-bottom)); background:rgba(10,22,40,0.95); backdrop-filter:blur(10px); flex-shrink:0; }
    .input-row { display:flex; gap:6px; align-items:flex-end; }
    #textInput { flex:1; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:10px 13px; color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; outline:none; resize:none; max-height:120px; min-height:42px; transition:border-color 0.2s; line-height:1.5; }
    #textInput:focus{border-color:rgba(245,200,0,0.5);}
    #textInput::placeholder{color:var(--text-muted);}
    .icon-btn { width:42px; height:42px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--yellow); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:16px; }
    .icon-btn:active{transform:scale(0.92);}
    .icon-btn.recording { background:rgba(255,50,50,0.15); border-color:#ff4d4d; color:#ff4d4d; animation:rec-pulse 1s ease-in-out infinite; }
    @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0.4);}50%{box-shadow:0 0 0 8px rgba(255,77,77,0);} }
    .send-btn { width:42px; height:42px; border-radius:10px; border:none; background:var(--yellow); color:var(--navy); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:16px; }
    .send-btn:active{transform:scale(0.92);}
    #fileInput{display:none;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">

</div>

<!-- APP -->
<div id="app">
  <header>

    <button class="main-btn" onclick="handleMainBtn('tiyatro')"><span class="main-btn-icon">🎭</span><span id="btn6">Tiyatro</span></button>
    <button class="main-btn" onclick="handleMainBtn('konser')"><span class="main-btn-icon">🎵</span><span id="btn7">Konser</span></button>
    <button class="main-btn" onclick="handleMainBtn('doviz')"><span class="main-btn-icon">💱</span><span id="btn8">Döviz</span></button>
    <button class="main-btn" onclick="handleMainBtn('urun')"><span class="main-btn-icon">🛒</span><span id="btn9">Ürün</span></button>
    <button class="main-btn" onclick="handleMainBtn('ceviri')"><span class="main-btn-icon">🌍</span><span id="btn10">Çeviri</span></button>
    <button class="main-btn" onclick="handleMainBtn('yemek')"><span class="main-btn-icon">🍽️</span><span id="btn11">Yemek</span></button>
    <button class="main-btn" onclick="document.getElementById('fileInput').click()"><span class="main-btn-icon">📷</span><span id="btn12">Kamera</span></button>
  </div>

  <div id="chatArea"></div>

  <div class="image-preview-wrap" id="imagePreviewWrap" style="display:none;">
    <div class="image-preview">
      <img id="imagePreview" src="" alt="preview" />
      <button class="image-preview-remove" onclick="removeImage()">x</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="textInput" placeholder="Mesajinizi yazin..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="icon-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleImage(event)" />
</div>

<script>
  const PASSWORD = "uszmate2026";

  const T = {
    tr: {
      placeholder:"Mesajinizi yazin...",
      wrongPass:"Hatali sifre. Tekrar deneyin.",
      infoTitle:"🤖 BENİMLE YAPABİLECEKLERİN",
      infoText:"Bana istediğin her şeyi sorabilirsin ve burada istediğin her şeyin satın alma linkine ulaşabilirsin.",
      locating:"Konum aliniyor...",
      connErr:"Baglanti hatasi. Lutfen tekrar deneyin.",
      noMic:"Tarayiciniz sesli komut desteklemiyor.",
      photoAdded:"[Fotograf eklendi]",
      photoAnalyze:"Bu fotografi analiz et ve acikla.",
      systemLang:"Turkce",
      aiNotice:"Yapay zeka ile calisir",
      loginAiNotice:"Bu uygulama yapay zeka teknolojisi ile calismaktadir.",
      loginBtn:"GIRIS YAP",
      infoTitle:"BENİMLE YAPABİLECEKLERİN",
      infoText:"Eğer sıfır araç istiyorsan dilediğin markanın satış mağazasına ve web sitesine ulaşabilirsin. 2. el araç istiyorsan satış galerisine ve internet satış mağaza linkine ulaşabilirsin. Sıfır ev istiyorsan inşaat firmalarının listesine ve web sitelerine ulaşabilirsin. 2. el ev ve kiralık ev arıyorsan internet satış ve kiralık ev internet linkine ulaşabilirsin. Bulunduğun şehirde aradığın banka, hastane, eczane, otel, restoran, kafe, mağazaların isimlerine ve internet linklerine ulaşabilirsin. Uçak bilet fiyatlarını görebilir ve alım linkine ulaşabilirsin. Bulunduğun lokasyondaki sinema, konser, tiyatro gibi etkinlikleri görebilir bilet alım linkine ulaşabilirsin. Bulunduğun lokasyonun para biriminin diğer para birimleri ile olan kurunu görebilirsin. Dilediğin her türlü ürünün fiyatlarına ve alım linkine ulaşabilirsin. Her dilden her dile çeviri yapabilirsin. Dilediğin yemeği satan kafe ve restoranın internet linkine ulaşabilir ve sipariş verebilirsin. Fotoğraf butonu ile dilediğin şeyin resmini çekip hakkında ayrıntılı bilgi edinebilirsin. Dilersen yazı ile dilersen mikrofon tuşu ile sesli komut verebilirsin.",
      btns:["Araç","Ev","Nerede","Uçuş","Sinema","Tiyatro","Konser","Döviz","Ürün","Çeviri","Yemek","Kamera"],
      btnMsgs:{
        sinema:"Bulunduğum lokasyonda şu an gösterimde olan en yüksek reytingli 5 filmi listele. Her film için sadece şunu ver: Film adı, başrol oyuncusu ve o filmin biletinin satıldığı sitenin ana sayfa linki (örnek: ticketon.kz). Başka bilgi ekleme. Geçmiş tarihli film gösterme.",
        tiyatro:"Bulunduğum lokasyonda şu an sahnede olan en iyi 5 tiyatro oyununu listele. Her oyun için sadece şunu ver: Oyun adı, başrol oyuncusu ve bilet satış sitesinin ana sayfa linki. Başka bilgi ekleme.",
        konser:"Bulunduğum lokasyondaki önümüzdeki 3 ay içindeki konserleri listele. Her konser için sadece şunu ver: Sanatçı adı, tarih ve bilet satış sitesinin ana sayfa linki. Geçmiş tarihli konser gösterme. Başka bilgi ekleme.",
        doviz:"Bulunduğum lokasyonun para biriminin 1 dolar karşılığını göster. Sadece bu bilgiyi ver, başka açıklama ekleme."
      }
    },
    en: {
      placeholder:"Type your message...",
      wrongPass:"Wrong password. Please try again.",
      locating:"Getting location...",
      connErr:"Connection error. Please try again.",
      noMic:"Your browser does not support voice commands.",
      photoAdded:"[Photo added]",
      photoAnalyze:"Analyze and explain this photo.",
      systemLang:"English",
      aiNotice:"Powered by AI",
      loginAiNotice:"This application is powered by artificial intelligence.",
      loginBtn:"LOGIN",
      infoTitle:"WHAT YOU CAN DO WITH ME",
      infoText:"You can ask me anything and access purchase links for anything you want here.",
      btns:["Vehicle","Home","Nearby","Flight","Cinema","Theater","Concert","Currency","Product","Translate","Food","Camera"],
      btnMsgs:{
        sinema:"List the top 5 highest-rated movies currently showing in my location. Only: Movie name, lead actor and direct ticket purchase link. No other info. No past dates.",
        tiyatro:"List the top 5 theater plays currently on stage in my location. Only: Play name, lead actor and direct ticket purchase link. No other info.",
        konser:"List concerts in my location for the next 3 months. Only: Artist name, date and direct ticket purchase link. No past dates. No other info.",
        doviz:"Show the local currency exchange rate for 1 USD only. No other explanation."
      }
    },
    ru: {
      placeholder:"Введите сообщение...",
      wrongPass:"Неверный пароль. Попробуйте снова.",
      locating:"Определение местоположения...",
      connErr:"Ошибка подключения. Попробуйте снова.",
      noMic:"Ваш браузер не поддерживает голосовые команды.",
      photoAdded:"[Фото добавлено]",
      photoAnalyze:"Проанализируй и объясни это фото.",
      systemLang:"Русском",
      aiNotice:"Работает на ИИ",
      loginAiNotice:"Это приложение работает на основе искусственного интеллекта.",
      loginBtn:"ВОЙТИ",
      infoTitle:"ЧТО ВЫ МОЖЕТЕ ДЕЛАТЬ СО МНОЙ",
      infoText:"Вы можете спросить меня о чём угодно и получить ссылки для покупки здесь.",
      btns:["Авто","Жильё","Где","Рейс","Кино","Театр","Концерт","Валюта","Товар","Перевод","Еда","Камера"],
      btnMsgs:{
        sinema:"Список 5 лучших фильмов в прокате в моём городе. Только: название фильма, главный актёр и прямая ссылка на покупку билета. Без прошедших дат.",
        tiyatro:"Список 5 лучших спектаклей в моём городе. Только: название, главный актёр и прямая ссылка на билет.",
        konser:"Концерты в моём городе на следующие 3 месяца. Только: артист, дата и прямая ссылка на билет. Без прошедших дат.",
        doviz:"Покажи только курс местной валюты к 1 доллару. Без других объяснений."
      }
    }
  };

  let currentLang='tr', conversationHistory=[], selectedImageBase64=null;
  let isRecording=false, recognition=null, isLoading=false, userLocation=null;

  function checkPassword() {
    const input=document.getElementById('passwordInput').value;
    if(input===PASSWORD){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('app').classList.add('visible');
      getLocation();
      updateDateTime();
    } else {
      document.getElementById('loginError').textContent=T[currentLang].wrongPass;
      document.getElementById('passwordInput').value='';
    }
  }
  document.getElementById('passwordInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});

  function updateDateTime() {
    const now = new Date();
    const dateStr = now.toLocaleDateString(currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU', {day:'numeric', month:'short', year:'numeric'});
    const timeStr = now.toLocaleTimeString(currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU', {hour:'2-digit', minute:'2-digit'});
    const el = document.getElementById('datetimeText');
    if(el) el.textContent = dateStr + ' ' + timeStr;
  }
  
  // Her dakika güncelle
  setInterval(updateDateTime, 60000);
  updateDateTime();

  function getLocation() {
    if(!navigator.geolocation){document.getElementById('locationText').textContent='Konum desteklenmiyor';return;}
    navigator.geolocation.getCurrentPosition(async pos=>{
      const lat=pos.coords.latitude, lon=pos.coords.longitude;
      userLocation={lat:lat,lon:lon,name:''};
      try {
        const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${currentLang}`);
        const data=await res.json();
        const city=data.address.city||data.address.town||data.address.village||'';
        const country=data.address.country||'';
        userLocation.name=`${city}, ${country}`;
        userLocation.lat=lat; userLocation.lon=lon;
        document.getElementById('locationText').textContent=`${city}, ${country}`;
      } catch {
        userLocation.name=`${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        userLocation.lat=lat; userLocation.lon=lon;
        document.getElementById('locationText').textContent=userLocation.name;
      }
    },()=>{document.getElementById('locationText').textContent=T[currentLang].locating;});
  }

  function setLang(lang,btn) {
    currentLang=lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const L=T[lang];
    document.getElementById('textInput').placeholder=L.placeholder;
    document.getElementById('infoTitle').textContent=L.infoTitle;
    document.getElementById('infoText').textContent=L.infoText;
    document.getElementById('headerAiNotice').textContent=L.aiNotice;
    document.getElementById('loginAiNotice').textContent=L.loginAiNotice;
    document.getElementById('loginBtn').textContent=L.loginBtn;
    L.btns.forEach((text,i)=>{
      const el=document.getElementById('btn'+(i+1));
      if(el) el.textContent=text;
    });
    // Lokasyonu yeni dilde guncelle
    if(userLocation&&userLocation.lat){
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLocation.lat}&lon=${userLocation.lon}&format=json&accept-language=${lang}`)
        .then(r=>r.json()).then(data=>{
          const city=data.address.city||data.address.town||data.address.village||'';
          const country=data.address.country||'';
          userLocation.name=`${city}, ${country}`;
          document.getElementById('locationText').textContent=`${city}, ${country}`;
        }).catch(()=>{});
    }
  }

  function handleMainBtn(type) {
    const L=T[currentLang];
    const now=new Date();
    const dateStr=now.toLocaleDateString(currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU',{day:'numeric',month:'long',year:'numeric'});
    
    let msg='';
    if(type==='sinema') msg=L.btnMsgs.sinema;
    else if(type==='tiyatro') msg=L.btnMsgs.tiyatro;
    else if(type==='konser') msg=L.btnMsgs.konser;
    else if(type==='doviz') msg=L.btnMsgs.doviz;
    else {
      const msgs={
        tr:{arac:"Araç hakkında yardım istiyorum.",ev:"Ev hakkında yardım istiyorum.",nerede:"Bulunduğum yerde popüler yerler.",ucus:"Uçuş arama.",urun:"Ürün arama.",ceviri:"Çeviri yapmak istiyorum.",yemek:"Yemek siparişi vermek istiyorum."},
        en:{arac:"I need help with vehicles.",ev:"I need help with homes.",nerede:"Popular places near me.",ucus:"Flight search.",urun:"Product search.",ceviri:"I want to translate something.",yemek:"I want to order food."},
        ru:{arac:"Мне нужна помощь с транспортом.",ev:"Мне нужна помощь с жильём.",nerede:"Популярные места рядом.",ucus:"Поиск рейсов.",urun:"Поиск товаров.",ceviri:"Я хочу перевести текст.",yemek:"Я хочу заказать еду."}
      };
      msg=msgs[currentLang][type]||'Yardım istiyorum.';
    }
    
    document.getElementById('textInput').value=msg;
    sendMessage();
  }

  function addMessage(role,content) {
    const chatArea=document.getElementById('chatArea');
    const div=document.createElement('div');
    div.className=`message ${role}`;
    div.innerHTML=formatMessage(content);
    chatArea.appendChild(div);
    chatArea.scrollTop=chatArea.scrollHeight;
    return div;
  }

  function formatMessage(text) {
    const urlRegex=/(https?:\/\/[^\s]+)/g;
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(urlRegex,'<a href="$1" target="_blank" rel="noopener">$1</a>')
      .replace(/\n/g,'<br>');
  }

  function showTyping() {
    const chatArea=document.getElementById('chatArea');
    const div=document.createElement('div');
    div.className='typing-indicator'; div.id='typingIndicator';
    div.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chatArea.appendChild(div); chatArea.scrollTop=chatArea.scrollHeight;
  }
  function hideTyping(){const t=document.getElementById('typingIndicator');if(t)t.remove();}

  async function sendMessage() {
    if(isLoading) return;
    const input=document.getElementById('textInput');
    const text=input.value.trim();
    if(!text&&!selectedImageBase64) return;
    input.value=''; autoResize(input);
    const L=T[currentLang];
    let userContent=[];
    if(selectedImageBase64){
      userContent.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:selectedImageBase64}});
      addMessage('user',(text||'')+' '+L.photoAdded);
    } else { addMessage('user',text); }
    if(text) userContent.push({type:"text",text});
    else if(selectedImageBase64) userContent.push({type:"text",text:L.photoAnalyze});
    removeImage();
    conversationHistory.push({role:"user",content:userContent.length===1&&userContent[0].type==='text'?text:userContent});
    isLoading=true; showTyping();

    const now=new Date();
    const dateStr=now.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
    const timeStr=now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    const locInfo=userLocation?`Kullanicinin konumu: ${userLocation.name}, koordinatlar: ${userLocation.lat},${userLocation.lon}`:'Konum yok';

    const systemPrompt=`Sen USZMate — USZ Digital kisisel AI asistani. Bugun: ${dateStr}, Saat: ${timeStr}. ${locInfo}. Kullanici ${L.systemLang} konusuyor, sen de MUTLAKA ${L.systemLang} dilinde cevap ver.

Her zaman web arastirmasi yap ve GUNCEL bilgi getir.

ZORUNLU FORMAT — Her sorguda mutlaka su formatta ver:
1. [Firma/Yer Adi]
   Adres: [tam adres]
   Tel: [telefon]
   Web: [o urunun veya hizmetin oldugu direkt sayfa linki]

Maximum 5 sonuc listele. Her sonucun yaninda MUTLAKA web linki olsun — genel site degil, o urunun veya hizmetin oldugu DIREKT sayfa.

Ucus fiyatlarini DOLAR $ olarak goster.
Arac sorgusunda: yetkili satis magazalari + web linki.
2. el arac: internet satis siteleri + link.
Ev sorgusunda: insaat firmalari veya emlak siteleri + link.
Sinema/tiyatro/konser: sadece guncel ve gelecekteki gosterimler, gecmis tarihli gosterme. Film/oyun adi + baslol oyuncusu + direkt bilet linki.
Doviz: anlık kur bilgisi.
Film isimlerini ${L.systemLang} diline cevir.`;

    try {
      const response=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:systemPrompt,messages:conversationHistory})
      });
      const data=await response.json();
      hideTyping();
      const reply=data.reply||L.connErr;
      addMessage('ai',reply);
      conversationHistory.push({role:"assistant",content:reply});
    } catch(err){hideTyping();addMessage('ai',T[currentLang].connErr);}
    isLoading=false;
  }

  function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

  function handleImage(event){
    const file=event.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{selectedImageBase64=e.target.result.split(',')[1];document.getElementById('imagePreview').src=e.target.result;document.getElementById('imagePreviewWrap').style.display='block';};
    reader.readAsDataURL(file); event.target.value='';
  }
  function removeImage(){selectedImageBase64=null;document.getElementById('imagePreviewWrap').style.display='none';document.getElementById('imagePreview').src='';}

  function toggleMic(){
    const L=T[currentLang];
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){addMessage('ai',L.noMic);return;}
    const btn=document.getElementById('micBtn');
    if(isRecording){recognition.stop();isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.lang=currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU';
    recognition.interimResults=false; recognition.maxAlternatives=1;
    recognition.onstart=()=>{isRecording=true;btn.classList.add('recording');btn.textContent='⏹';};
    recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('textInput').value=t;autoResize(document.getElementById('textInput'));sendMessage();};
    recognition.onend=()=>{isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';};
    recognition.onerror=()=>{isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';};
    recognition.start();
  }
</script>
</body>
</html>
