<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="USZMate" />
  <title>USZMate</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #0f2040;
      --navy-light: #162d55;
      --yellow: #f5c800;
      --yellow-glow: rgba(245,200,0,0.15);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --border: rgba(245,200,0,0.2);
      --input-bg: rgba(255,255,255,0.05);
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Outfit',sans-serif; background:var(--navy); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 20%,rgba(245,200,0,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(245,200,0,0.04) 0%,transparent 50%); pointer-events:none; z-index:0; }

    /* LOGIN */
    #loginScreen { position:fixed; inset:0; background:var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:24px; padding:40px; }
    #loginScreen::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 40%,rgba(245,200,0,0.08) 0%,transparent 60%); pointer-events:none; }
    .login-logo { font-family:'Bebas Neue',sans-serif; font-size:72px; color:var(--yellow); letter-spacing:8px; text-shadow:0 0 40px rgba(245,200,0,0.4); animation:pulse-glow 3s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100%{text-shadow:0 0 40px rgba(245,200,0,0.4);}50%{text-shadow:0 0 60px rgba(245,200,0,0.7);} }
    .login-subtitle { font-size:12px; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; margin-top:-16px; }
    .login-ai-notice { font-size:10px; color:rgba(245,200,0,0.4); text-align:center; }
    .login-form { display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; position:relative; z-index:1; }
    .login-input { background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:14px 20px; color:var(--text); font-family:'Outfit',sans-serif; font-size:16px; outline:none; text-align:center; letter-spacing:4px; transition:border-color 0.2s; }
    .login-input:focus { border-color:var(--yellow); box-shadow:0 0 20px rgba(245,200,0,0.15); }
    .login-input::placeholder { letter-spacing:1px; color:var(--text-muted); }
    .login-btn { background:var(--yellow); color:var(--navy); border:none; border-radius:12px; padding:14px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; cursor:pointer; }
    .login-error { color:#ff4d4d; font-size:13px; text-align:center; min-height:18px; }

    /* APP */
    #app { display:none; flex-direction:column; height:100dvh; position:relative; z-index:1; }
    #app.visible { display:flex; }

    /* HEADER */
    header { display:flex; align-items:flex-start; justify-content:space-between; padding:10px 14px 6px; background:rgba(10,22,40,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); flex-shrink:0; }
    .header-left { display:flex; flex-direction:column; gap:1px; }
    .header-brand { font-size:9px; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; line-height:1.6; }
    .header-brand span { display:block; }
    .header-ai-notice { font-size:8px; color:rgba(245,200,0,0.4); }
    .header-center { position:absolute; left:50%; transform:translateX(-50%); top:6px; text-align:center; }
    .header-title { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--yellow); letter-spacing:8px; line-height:1; text-shadow:0 0 20px rgba(245,200,0,0.3); }
    .lang-selector { display:flex; gap:3px; }
    .lang-btn { background:transparent; border:1px solid transparent; border-radius:6px; padding:3px 7px; color:var(--text-muted); font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .lang-btn.active { background:var(--yellow-glow); border-color:var(--yellow); color:var(--yellow); }

    /* LOCATION + DATETIME */
    .location-bar { background:rgba(245,200,0,0.08); border-bottom:1px solid var(--border); padding:4px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .loc-text { font-size:11px; color:var(--yellow); }
    .datetime-text { font-size:10px; color:rgba(245,200,0,0.7); }

    /* MAIN BUTTONS */
    .main-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:6px 8px; background:rgba(10,22,40,0.95); flex-shrink:0; border-bottom:1px solid var(--border); }
    .main-btn { background:var(--navy-mid); border:1px solid var(--border); border-radius:6px; padding:4px 6px; color:var(--yellow); font-size:10px; font-weight:600; cursor:pointer; display:flex; flex-direction:row; align-items:center; gap:4px; transition:all 0.2s; }
    .main-btn:active { transform:scale(0.95); background:var(--yellow-glow); }
    .main-btn-icon { font-size:14px; flex-shrink:0; }

    /* CHAT */
    #chatArea { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; background:#e8e8e8; border-bottom:2px solid var(--yellow); }
    #chatArea::-webkit-scrollbar{width:4px;}
    #chatArea::-webkit-scrollbar-thumb{background:#aaa;border-radius:2px;}
    .message { max-width:90%; padding:10px 13px; border-radius:var(--radius); font-size:13px; line-height:1.6; animation:fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    .message.ai { background:#fff; border:1px solid #ccc; align-self:flex-start; border-bottom-left-radius:4px; color:#111; }
    .message.user { background:var(--navy); border:1px solid var(--navy-light); align-self:flex-end; border-bottom-right-radius:4px; color:var(--yellow); }
    .message a { color:#1a56db; text-decoration:underline; }
    .message.user a { color:var(--yellow); }
    .typing-indicator { display:flex; gap:5px; padding:12px 14px; background:#fff; border:1px solid #ccc; border-radius:var(--radius); border-bottom-left-radius:4px; align-self:flex-start; }
    .typing-dot { width:7px; height:7px; background:var(--navy); border-radius:50%; animation:typing 1.2s infinite; opacity:0.4; }
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typing { 0%,100%{opacity:0.4;transform:translateY(0);}50%{opacity:1;transform:translateY(-4px);} }

    /* IMAGE PREVIEW */
    .image-preview-wrap { padding:6px 14px 0; flex-shrink:0; background:rgba(10,22,40,0.95); }
    .image-preview { position:relative; display:inline-block; }
    .image-preview img { height:56px; width:56px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
    .image-preview-remove { position:absolute; top:-6px; right:-6px; background:#ff4d4d; border:none; border-radius:50%; width:18px; height:18px; color:white; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* INPUT */
    .input-area { padding:8px 12px; padding-bottom:max(8px,env(safe-area-inset-bottom)); background:rgba(10,22,40,0.95); flex-shrink:0; }
    .input-row { display:flex; gap:6px; align-items:flex-end; }
    #textInput { flex:1; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:10px 13px; color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; outline:none; resize:none; max-height:120px; min-height:42px; line-height:1.5; }
    #textInput:focus{border-color:rgba(245,200,0,0.5);}
    #textInput::placeholder{color:var(--text-muted);}
    .icon-btn { width:42px; height:42px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--yellow); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
    .icon-btn.recording { background:rgba(255,50,50,0.15); border-color:#ff4d4d; color:#ff4d4d; animation:rec-pulse 1s ease-in-out infinite; }
    @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0.4);}50%{box-shadow:0 0 0 8px rgba(255,77,77,0);} }
    .send-btn { width:42px; height:42px; border-radius:10px; border:none; background:var(--yellow); color:var(--navy); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
    #fileInput{display:none;}
  </style>
</head>

    <button class="main-btn" onclick="handleBtn('ceviri')"><span class="main-btn-icon">🌍</span><span id="btn10">Çeviri</span></button>

let currentLang='tr', conversationHistory=[], selectedImageBase64=null;
let isRecording=false, recognition=null, isLoading=false, userLocation=null;

function checkPassword() {
  const v = document.getElementById('passwordInput').value;
  if(v === PASSWORD) {
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').classList.add('visible');
    getLocation();
    updateDateTime();
  } else {
    document.getElementById('loginError').textContent = T[currentLang].wrongPass;
    document.getElementById('passwordInput').value='';
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPassword(); });

function updateDateTime() {
  const now = new Date();
  const d = now.toLocaleDateString(currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU', {day:'numeric',month:'short',year:'numeric'});
  const t = now.toLocaleTimeString(currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU', {hour:'2-digit',minute:'2-digit'});
  const el = document.getElementById('datetimeText');
  if(el) el.textContent = d + ' ' + t;
}
setInterval(updateDateTime, 60000);

function getLocation() {
  if(!navigator.geolocation){ document.getElementById('locationText').textContent='Konum yok'; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    userLocation = {lat, lon, name:'', countryCode:''};
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${currentLang}`);
      const d = await r.json();
      const city = d.address.city||d.address.town||d.address.village||'';
      const country = d.address.country||'';
      const cc = d.address.country_code||'';
      userLocation.name = `${city}, ${country}`;
      userLocation.countryCode = cc;
      document.getElementById('locationText').textContent = `${city}, ${country}`;
    } catch {
      userLocation.name = `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
      document.getElementById('locationText').textContent = userLocation.name;
    }
  }, ()=>{ document.getElementById('locationText').textContent = T[currentLang].locating; });
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const L = T[lang];
  document.getElementById('textInput').placeholder = L.placeholder;
  document.getElementById('headerAiNotice').textContent = L.aiNotice;
  document.getElementById('loginAiNotice').textContent = L.loginAiNotice;
  document.getElementById('loginBtn').textContent = L.loginBtn;
  L.btns.forEach((text,i)=>{ const el=document.getElementById('btn'+(i+1)); if(el) el.textContent=text; });
  updateDateTime();
  // Lokasyonu yeni dilde guncelle
  if(userLocation && userLocation.lat) {
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLocation.lat}&lon=${userLocation.lon}&format=json&accept-language=${lang}`)
      .then(r=>r.json()).then(d=>{
        const city=d.address.city||d.address.town||d.address.village||'';
        const country=d.address.country||'';
        userLocation.name=`${city}, ${country}`;
        document.getElementById('locationText').textContent=`${city}, ${country}`;
      }).catch(()=>{});
  }
}
function showCurrencyCalculator() {
  const existing = document.getElementById('currencyModal');
  if(existing) existing.remove();
  
  const modal = document.createElement('div');
  modal.id = 'currencyModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:#0a1628;border:1px solid rgba(245,200,0,0.3);border-radius:16px;padding:20px;width:100%;max-width:340px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span style="color:#f5c800;font-size:16px;font-weight:700;">💱 Döviz Hesaplama</span>
        <button onclick="document.getElementById('currencyModal').remove()" style="background:transparent;border:none;color:#f5c800;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="number" id="calcAmount" placeholder="Miktar" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(245,200,0,0.2);border-radius:8px;padding:10px;color:white;font-size:15px;outline:none;">
        <select id="calcFrom" style="background:#0f2040;border:1px solid rgba(245,200,0,0.2);border-radius:8px;padding:10px;color:#f5c800;font-size:14px;outline:none;">
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
          <option value="TRY">TRY ₺</option>
          <option value="KZT">KZT ₸</option>
          <option value="AED">AED د.إ</option>
        </select>
      </div>
      <div style="text-align:center;color:rgba(245,200,0,0.6);margin-bottom:12px;">▼</div>
      <div style="margin-bottom:16px;">
        <select id="calcTo" style="width:100%;background:#0f2040;border:1px solid rgba(245,200,0,0.2);border-radius:8px;padding:10px;color:#f5c800;font-size:14px;outline:none;">
          <option value="KZT">KZT ₸</option>
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
          <option value="TRY">TRY ₺</option>
          <option value="AED">AED د.إ</option>
        </select>
      </div>
      <button onclick="calcCurrency()" style="width:100%;background:#f5c800;color:#0a1628;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;">HESAPLA</button>
      <div id="calcResult" style="margin-top:12px;text-align:center;color:#f5c800;font-size:18px;font-weight:700;min-height:28px;"></div>

  document.body.appendChild(modal);
}

async function calcCurrency() {
  const amount = parseFloat(document.getElementById('calcAmount').value);
  const from = document.getElementById('calcFrom').value;
  const to = document.getElementById('calcTo').value;
  const result = document.getElementById('calcResult');
  
  if(!amount || isNaN(amount)) { result.textContent = 'Miktar giriniz'; return; }
  if(from === to) { result.textContent = amount + ' ' + from; return; }
  
  result.textContent = '...';
  
  try {
    const r = await fetch(`https://api.frankfurter.app/latest?amount=${amount}&from=${from}&to=${to}`);
    const d = await r.json();
    const converted = d.rates[to];
    result.textContent = `${amount} ${from} = ${converted.toFixed(2)} ${to}`;
  } catch {
    result.textContent = 'Kur bilgisi alinamadi';
  }
}
function getTicketSitesHtml() {
  const cc = (userLocation?.countryCode||'').toLowerCase();
  const sites = TICKET_SITES[cc] || TICKET_SITES.default;
  const label = T[currentLang].ticketLabel;
  const links = sites.map(s=>`<a href="${s.u}" target="_blank" rel="noopener">${s.n}</a>`).join(' | ');
  return `<br><br>${label} ${links}`;
}

function handleBtn(type) {
  const L = T[currentLang];
  const isEntertainment = ['sinema','tiyatro','konser'].includes(type);
  
  let msg = '';
  if(type==='sinema') msg = L.sinemaMsg;
  else if(type==='tiyatro') msg = L.tiyatroMsg;
  else if(type==='konser') msg = L.konserMsg;
  else if(type==='doviz') msg = `${userLocation?.name||'bulundugum yer'} lokasyonunun resmi para biriminin 1 dolar karsiligi nedir? Sadece bu bilgiyi ver.`;
  else {
    const msgs = {
      tr:{arac:"Arac hakkinda yardim istiyorum.",ev:"Ev hakkinda yardim istiyorum.",nerede:"Bulundugum yerde populer yerler.",ucus:"Ucus aramak istiyorum.",urun:"Urun aramak istiyorum.",ceviri:"Ceviri yapmak istiyorum.",yemek:"Yemek siparisi vermek istiyorum."},
      en:{arac:"I need help with vehicles.",ev:"I need help finding a home.",nerede:"Popular places near me.",ucus:"I want to search flights.",urun:"I want to search for a product.",ceviri:"I want to translate something.",yemek:"I want to order food."},
      ru:{arac:"Мне нужна помощь с транспортом.",ev:"Мне нужна помощь с жильём.",nerede:"Популярные места рядом.",ucus:"Хочу найти рейс.",urun:"Хочу найти товар.",ceviri:"Хочу перевести текст.",yemek:"Хочу заказать еду."}
    };
    msg = msgs[currentLang][type] || '';
  }
  
  document.getElementById('textInput').value = msg;
  
  if(isEntertainment) {
    sendMessageThenAppendLinks();
  } else {
    sendMessage();
  }
}

async function sendMessageThenAppendLinks() {
  await sendMessage();
  // Cevap geldikten sonra 500ms bekle, sonra linkleri ekle
  setTimeout(()=>{
    const chatArea = document.getElementById('chatArea');
    const msgs = chatArea.querySelectorAll('.message.ai');
    const last = msgs[msgs.length-1];
    if(last && !last.dataset.linksAdded) {
      last.innerHTML += getTicketSitesHtml();
      last.dataset.linksAdded = 'true';
    }
  }, 500);
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = formatMessage(content);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function formatMessage(text) {
  const urlRegex = /(https?:\/\/[^\s<]+)/g;
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(urlRegex,'<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g,'<br>');
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className='typing-indicator'; div.id='typingIndicator';
  div.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typingIndicator'); if(t) t.remove(); }

async function sendMessage() {
  if(isLoading) return;
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if(!text && !selectedImageBase64) return;
  input.value=''; autoResize(input);
  
  const L = T[currentLang];
  let userContent = [];
  
  if(selectedImageBase64) {
    userContent.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:selectedImageBase64}});
    addMessage('user', (text||'') + ' ' + L.photoAdded);
  } else {
    addMessage('user', text);
  }
  
  if(text) userContent.push({type:"text",text});
  else if(selectedImageBase64) userContent.push({type:"text",text:L.photoAnalyze});
  
  removeImage();
  conversationHistory.push({role:"user", content: userContent.length===1&&userContent[0].type==='text' ? text : userContent});
  
  isLoading = true;
  showTyping();
  
  const now = new Date();
  const dateStr = now.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
  const timeStr = now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const locInfo = userLocation ? `Konum: ${userLocation.name}, GPS: ${userLocation.lat},${userLocation.lon}, Ulke kodu: ${userLocation.countryCode}` : 'Konum yok';

  const systemPrompt = `Sen USZMate — USZ Digital kisisel AI asistani.
Bugun: ${dateStr}, Saat: ${timeStr}.
${locInfo}.
Kullanici ${L.systemLang} konusuyor, sen de MUTLAKA ${L.systemLang} dilinde cevap ver.

Her zaman web arastirmasi yap ve GUNCEL bilgi getir.

ONEMLI KURALLAR:
- Sinema/tiyatro/konser sorgularinda KESINLIKLE HICBIR LINK YAZMA. Ne film linki, ne bilet linki, hicbir link. Sadece bilgi ver.
- Diger sorgularda: firma adi, adres, telefon ve web sitesi linkini ver. Max 5 sonuc.
- Ucus fiyatlarini DOLAR $ olarak goster.
- Gecmis tarihli etkinlik gosterme.
- Kisa ve net cevaplar ver.`;

  try {
    const response = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({system: systemPrompt, messages: conversationHistory})
    });
    const data = await response.json();
    hideTyping();
    const reply = data.reply || L.connErr;
    addMessage('ai', reply);
    conversationHistory.push({role:"assistant", content: reply});
  } catch(err) {
    hideTyping();
    addMessage('ai', T[currentLang].connErr);
  }
  
  isLoading = false;
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function handleImage(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ selectedImageBase64=e.target.result.split(',')[1]; document.getElementById('imagePreview').src=e.target.result; document.getElementById('imagePreviewWrap').style.display='block'; };
  reader.readAsDataURL(file); event.target.value='';
}
function removeImage() { selectedImageBase64=null; document.getElementById('imagePreviewWrap').style.display='none'; document.getElementById('imagePreview').src=''; }

function toggleMic() {
  const L = T[currentLang];
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){addMessage('ai',L.noMic);return;}
  const btn = document.getElementById('micBtn');
  if(isRecording){recognition.stop();isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';return;}
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = currentLang==='tr'?'tr-TR':currentLang==='en'?'en-US':'ru-RU';
  recognition.interimResults=false; recognition.maxAlternatives=1;
  recognition.onstart=()=>{isRecording=true;btn.classList.add('recording');btn.textContent='⏹';};
  recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('textInput').value=t;autoResize(document.getElementById('textInput'));sendMessage();};
  recognition.onend=()=>{isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';};
  recognition.onerror=()=>{isRecording=false;btn.classList.remove('recording');btn.textContent='🎤';};
  recognition.start();
}
</script>
